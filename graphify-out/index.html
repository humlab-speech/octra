 "control_control_required", "relation": "method", "confidence": "EXTRACTED", "source_file": "/Users/frkkan96/Documents/src/octra/apps/octra/src/app/core/obj/FeedbackForm/Control.ts", "source_location": "L17", "weight": 1.0}, {"source": "control_control", "target": "control_control_type", "relation": "method", "confidence": "EXTRACTED", "source_file": "/Users/frkkan96/Documents/src/octra/apps/octra/src/app/core/obj/FeedbackForm/Control.ts", "source_location": "L21", "weight": 1.0}]};
        
        const svg = d3.select('#canvas')
            .attr('width', width)
            .attr('height', height);
        
        const simulation = d3.forceSimulation(graphData.nodes)
            .force('link', d3.forceLink(graphData.edges)
                .id(d => d.id)
                .distance(30))
            .force('charge', d3.forceManyBody().strength(-50))
            .force('center', d3.forceCenter(width / 2, height / 2));
        
        const link = svg.append('g')
            .selectAll('line')
            .data(graphData.edges)
            .enter()
            .append('line')
            .attr('class', 'link');
        
        const node = svg.append('g')
            .selectAll('circle')
            .data(graphData.nodes)
            .enter()
            .append('circle')
            .attr('class', 'node')
            .attr('r', d => 5 + (d.label ? d.label.length * 0.2 : 5))
            .attr('fill', d => {
                const type = d.file_type || 'unknown';
                if (type.includes('service')) return '#64b5f6';
                if (type.includes('component')) return '#ff9800';
                return '#4caf50';
            })
            .on('mouseover', function(event, d) {
                document.getElementById('node-info').innerHTML = `
                    <strong>${d.label || d.id}</strong><br>
                    Type: ${d.file_type || 'unknown'}<br>
                    File: ${(d.source_file || 'N/A').split('/').pop()}<br>
                    ID: ${d.id}
                `;
            })
            .call(drag(simulation));
        
        simulation.on('tick', () => {
            link
                .attr('x1', d => d.source.x)
                .attr('y1', d => d.source.y)
                .attr('x2', d => d.target.x)
                .attr('y2', d => d.target.y);
            
            node
                .attr('cx', d => d.x)
                .attr('cy', d => d.y);
        });
        
        function drag(simulation) {
            function dragstarted(event, d) {
                if (!event.active) simulation.alphaTarget(0.3).restart();
                d.fx = d.x;
                d.fy = d.y;
            }
            function dragged(event, d) {
                d.fx = event.x;
                d.fy = event.y;
            }
            function dragended(event, d) {
                if (!event.active) simulation.alphaTarget(0);
                d.fx = null;
                d.fy = null;
            }
            return d3.drag()
                .on('start', dragstarted)
                .on('drag', dragged)
                .on('end', dragended);
        }
    </script>
