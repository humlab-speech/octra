<div class="modal-content">
  <div class="modal-header">
    <h5 class="modal-title">
      {{ 'modal.add translated level.title' | transloco }}
    </h5>
    <button
      type="button"
      class="btn-close"
      (click)="close()"
    >
      <span class="visually-hidden">Close</span>
    </button>
  </div>
  <div class="modal-body">
    @if (eligibleSourceLevels.length === 0) {
      <div class="alert alert-warning mb-0">
        {{ 'modal.add translated level.no source' | transloco }}
      </div>
    } @else {
      <div class="mb-3">
        <label for="atl-source" class="form-label">
          {{ 'modal.add translated level.source' | transloco }}
        </label>
        <select
          id="atl-source"
          class="form-select"
          [(ngModel)]="selectedSourceLevelId"
        >
          @for (level of eligibleSourceLevels; track level.id) {
            <option [ngValue]="level.id">{{ level.name }}</option>
          }
        </select>
      </div>
      <div class="mb-3">
        <label for="atl-target" class="form-label">
          {{ 'modal.add translated level.target' | transloco }}
        </label>
        <select
          id="atl-target"
          class="form-select"
          [(ngModel)]="targetLanguage"
        >
          @for (lang of languages; track lang.code) {
            <option [value]="lang.code">{{ lang.label }}</option>
          }
        </select>
      </div>
      <small class="text-muted d-block">
        <i class="bi bi-info-circle"></i>
        {{ 'modal.add translated level.hint' | transloco }}
      </small>
    }
  </div>
  <div class="modal-footer">
    <button type="button" class="btn btn-default" (click)="close()">
      {{ 'g.abort' | transloco }}
    </button>
    <button
      type="button"
      class="btn btn-secondary"
      [disabled]="!canSubmit"
      (click)="submit(false)"
    >
      {{ 'modal.add translated level.create' | transloco }}
    </button>
    <button
      type="button"
      class="btn btn-primary"
      [disabled]="!canSubmit"
      (click)="submit(true)"
    >
      <i class="bi bi-translate"></i>
      {{ 'modal.add translated level.create and translate' | transloco }}
    </button>
  </div>
</div>
